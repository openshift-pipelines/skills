name: Update Sprint Data

on:
  schedule:
    - cron: '0 */2 * * 1-5' # Every 2 hours on weekdays

  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Fetch sprint data
        env:
          JIRA_CLOUD_EMAIL: ${{ secrets.JIRA_CLOUD_EMAIL }}
          JIRA_CLOUD_TOKEN: ${{ secrets.JIRA_CLOUD_TOKEN }}
        run: |
          mkdir -p ~/.config/osp
          node -e "
            const fs = require('fs');
            fs.writeFileSync(
              process.env.HOME + '/.config/osp/config.json',
              JSON.stringify({
                jira_cloud: {
                  email: process.env.JIRA_CLOUD_EMAIL,
                  token: process.env.JIRA_CLOUD_TOKEN
                }
              })
            );
          "

          node bin/sprint-status.js --all --publish

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build:ghpages

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy docs/sprint --project-name sprint-dashboard --commit-dirty=true
