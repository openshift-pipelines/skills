name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate skill YAML frontmatter
        run: |
          for file in commands/osp/*.md; do
            echo "Checking $file..."
            if ! head -50 "$file" | grep -q "^name:"; then
              echo "ERROR: $file missing 'name' in frontmatter"
              exit 1
            fi
            if ! head -50 "$file" | grep -q "^description:"; then
              echo "ERROR: $file missing 'description' in frontmatter"
              exit 1
            fi
            if ! head -50 "$file" | grep -q "^allowed-tools:"; then
              echo "ERROR: $file missing 'allowed-tools' in frontmatter"
              exit 1
            fi
            echo "  OK"
          done
          echo "All skill files validated successfully"

  install-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Test installation script
        run: |
          node bin/install.js --help
          node bin/install.js -c test-install
          ls test-install/commands/osp/
          for skill in help configure task pipeline debug map-jira-to-upstream release-status sprint-status sprint-history; do
            if [ ! -f "test-install/commands/osp/${skill}.md" ]; then
              echo "ERROR: ${skill}.md not found"
              exit 1
            fi
          done
          for script in sprint-status.js sprint-history.js; do
            if [ ! -f "test-install/bin/osp/${script}" ]; then
              echo "ERROR: ${script} not found"
              exit 1
            fi
          done
          echo "Installation test passed"

  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "docs/templates/built/index.html" ]; then
            echo "ERROR: Dashboard build output not found"
            exit 1
          fi
          echo "Dashboard build verified"
