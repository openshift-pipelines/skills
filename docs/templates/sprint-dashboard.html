<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Dashboard</title>
  <style>
    :root {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-table: #f0f4f8;
      --text-primary: #1a1a2e;
      --text-secondary: #6c757d;
      --text-dim: #adb5bd;
      --border-color: #dee2e6;
      --green: #06d6a0;
      --yellow: #ffd166;
      --red: #ef476f;
      --orange: #ff8c42;
      --accent: #00b4d8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1a1a2e;
        --bg-secondary: #16213e;
        --bg-card: #0f3460;
        --bg-table: #16213e;
        --text-primary: #f8f9fa;
        --text-secondary: #adb5bd;
        --text-dim: #6c757d;
        --border-color: #495057;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 20px;
    }

    #app {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: 1.5rem;
      margin: 2rem 0 1rem;
      color: var(--text-primary);
    }

    h3 {
      font-size: 1.2rem;
      margin: 1.5rem 0 0.75rem;
      color: var(--text-primary);
    }

    .meta {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin: 1.5rem 0;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .card .label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .card.green .value {
      color: var(--green);
    }

    .card.yellow .value {
      color: var(--yellow);
    }

    .card.red .value {
      color: var(--red);
    }

    .alert {
      background: var(--bg-card);
      border-left: 4px solid var(--yellow);
      padding: 10px;
      margin: 0.75rem 0;
      border-radius: 4px;
    }

    .alert.critical {
      border-left-color: var(--red);
    }

    .alert.positive {
      border-left-color: var(--green);
    }

    .alert strong {
      display: block;
      margin-bottom: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin: 1rem 0;
      background: var(--bg-secondary);
    }

    th {
      background: var(--bg-table);
      padding: 10px;
      text-align: left;
      font-weight: bold;
      border-bottom: 2px solid var(--border-color);
    }

    td {
      padding: 10px;
      border-bottom: 1px solid var(--border-color);
    }

    tr:hover {
      background: var(--bg-card);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .bar-row {
      display: flex;
      align-items: center;
      margin: 8px 0;
    }

    .bar-label {
      width: 140px;
      text-align: right;
      padding-right: 12px;
      font-size: 0.85rem;
    }

    .bar-track {
      flex: 1;
      height: 22px;
      background: var(--bg-card);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
    }

    .bar-fill-done {
      background: var(--green);
      height: 100%;
    }

    .bar-fill-carried {
      background: var(--yellow);
      height: 100%;
    }

    .bar-value {
      width: 100px;
      padding-left: 12px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .bar-marker {
      font-size: 0.9rem;
      color: var(--accent);
      margin-left: 8px;
    }

    .proximity {
      display: inline-flex;
      gap: 2px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot.filled {
      background: var(--green);
    }

    .dot.empty {
      border: 1px solid var(--border-color);
      background: transparent;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .tag.vuln {
      background: var(--red);
      color: white;
    }

    .tag.bug {
      background: var(--orange);
      color: white;
    }

    .tag.story {
      background: var(--accent);
      color: white;
    }

    .tag.complete {
      background: var(--green);
      color: white;
    }

    .tag.atRisk {
      background: var(--yellow);
      color: #1a1a2e;
    }

    .tag.incomplete {
      background: var(--red);
      color: white;
    }

    .roadmap-bar {
      display: flex;
      height: 28px;
      border-radius: 8px;
      overflow: hidden;
      margin: 1rem 0;
    }

    .roadmap-bar .planned {
      background: var(--green);
    }

    .roadmap-bar .unplanned {
      background: var(--yellow);
    }

    .roadmap-bar .cve {
      background: var(--red);
    }

    .legend {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      margin: 1rem 0;
    }

    .legend span::before {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      vertical-align: middle;
      border-radius: 2px;
    }

    .legend .planned::before {
      background: var(--green);
    }

    .legend .unplanned::before {
      background: var(--yellow);
    }

    .legend .cve::before {
      background: var(--red);
    }

    .carry-warning {
      color: var(--yellow);
      font-weight: bold;
    }

    .carry-critical {
      color: var(--red);
      font-weight: bolder;
    }

    .empty-state {
      color: var(--text-dim);
      font-style: italic;
      text-align: center;
      padding: 12px;
    }

    .dod-bar {
      display: flex;
      height: 28px;
      border-radius: 8px;
      overflow: hidden;
      margin: 1rem 0;
    }

    .dod-bar .complete {
      background: var(--green);
    }

    .dod-bar .at-risk {
      background: var(--yellow);
    }

    .dod-bar .incomplete {
      background: var(--red);
    }

    .collapsible {
      cursor: pointer;
      user-select: none;
    }

    .collapsible::before {
      content: '\25B8 ';
    }

    .collapsible.open::before {
      content: '\25BE ';
    }

    .collapsible-content {
      display: none;
    }

    .collapsible-content.open {
      display: block;
    }

    .score-high {
      color: var(--green);
      font-weight: bold;
    }

    .score-medium {
      color: var(--yellow);
      font-weight: bold;
    }

    .score-low {
      color: var(--red);
      font-weight: bold;
    }

    .truncate {
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .total-row {
      font-weight: bold;
      background: var(--bg-table);
    }

    .nested-section {
      margin: 1rem 0;
      padding-left: 1rem;
      border-left: 2px solid var(--border-color);
    }

    .section {
      margin-bottom: 3rem;
    }

    /* Health Score Badge */
    .health-score {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 1.4rem;
      font-weight: bold;
      margin: 1rem 0;
    }

    .health-score.health-green {
      background: var(--green);
      color: #1a1a2e;
    }

    .health-score.health-yellow {
      background: var(--yellow);
      color: #1a1a2e;
    }

    .health-score.health-red {
      background: var(--red);
      color: white;
    }

    .health-score .health-label {
      font-size: 0.85rem;
      font-weight: normal;
      opacity: 0.8;
    }

    /* Days Remaining Bar */
    .days-remaining {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 1rem 0 2rem;
      flex-wrap: wrap;
    }

    .days-remaining .progress-track {
      flex: 1;
      min-width: 200px;
      height: 16px;
      background: var(--bg-card);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .days-remaining .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 8px;
      transition: width 0.3s ease;
    }

    .days-remaining .day-text {
      font-size: 1rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .days-remaining .completion-pct {
      font-size: 2rem;
      font-weight: bold;
      color: var(--green);
      white-space: nowrap;
    }

    /* Filter Bar */
    .filter-bar {
      margin: 1rem 0 2rem;
    }

    .filter-bar input {
      width: 100%;
      padding: 10px 16px;
      font-size: 1rem;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .filter-bar input:focus {
      border-color: var(--accent);
    }

    .filter-bar input::placeholder {
      color: var(--text-dim);
    }

    tr.filter-hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const DATA = {};

    // Safe DOM helper
    function $(tag, attrs, children) {
      var args = Array.prototype.slice.call(arguments);
      var el = document.createElement(args[0]);
      var a = args.length > 1 && args[1] !== null && typeof args[1] === 'object' && !args[1].nodeType ? args[1] : null;
      var startIdx = a ? 2 : 1;

      if (a) {
        for (var keys = Object.keys(a), ki = 0; ki < keys.length; ki++) {
          var key = keys[ki];
          var value = a[key];
          if (key === 'className') {
            el.className = value;
          } else if (key.startsWith('on') && typeof value === 'function') {
            var event = key.substring(2).toLowerCase();
            el.addEventListener(event, value);
          } else {
            el.setAttribute(key, value);
          }
        }
      }

      for (var i = startIdx; i < args.length; i++) {
        var child = args[i];
        if (typeof child === 'string' || typeof child === 'number') {
          el.appendChild(document.createTextNode(String(child)));
        } else if (child && child.nodeType) {
          el.appendChild(child);
        }
      }

      return el;
    }

    // Create Jira link
    function link(key) {
      if (!DATA.meta || !DATA.meta.jiraBaseUrl) {
        return $(
          'a',
          { href: '#', target: '_blank' },
          key
        );
      }
      return $(
        'a',
        { href: DATA.meta.jiraBaseUrl + '/browse/' + key, target: '_blank' },
        key
      );
    }

    // Helper: get count from byStatus
    function getStatusCount(statusName) {
      if (!DATA.summary || !DATA.summary.byStatus || !DATA.summary.byStatus[statusName]) return 0;
      return DATA.summary.byStatus[statusName].count || 0;
    }

    function getStatusSP(statusName) {
      if (!DATA.summary || !DATA.summary.byStatus || !DATA.summary.byStatus[statusName]) return 0;
      return DATA.summary.byStatus[statusName].sp || 0;
    }

    // Compute Sprint Health Score
    function computeHealthScore() {
      if (!DATA.summary) return { score: 0, label: 'Unknown', level: 'red' };

      var totalSP = DATA.summary.totalSPs || 0;
      var completedSP = getStatusSP('Closed');
      var blockedCount = DATA.summary.blocked ? DATA.summary.blocked.count : 0;
      var totalIssues = DATA.summary.totalIssues || 1;
      var completionRate = totalSP > 0 ? (completedSP / totalSP * 100) : 0;
      var blockedRate = totalIssues > 0 ? (blockedCount / totalIssues * 100) : 0;

      // Check carry-forward severity
      var carryForwardSevere = false;
      if (DATA.carryForward && Array.isArray(DATA.carryForward)) {
        var severeCount = 0;
        for (var i = 0; i < DATA.carryForward.length; i++) {
          if ((DATA.carryForward[i].sprintCount || 0) >= 4) severeCount++;
        }
        carryForwardSevere = severeCount >= 3;
      }

      var level, label;
      if (completionRate >= 70 && blockedRate < 10 && !carryForwardSevere) {
        level = 'green';
        label = 'Healthy';
      } else if (completionRate < 50 || blockedRate >= 20 || carryForwardSevere) {
        level = 'red';
        label = 'At Risk';
      } else {
        level = 'yellow';
        label = 'Needs Attention';
      }

      return { score: Math.round(completionRate), label: label, level: level };
    }

    // Compute days remaining
    function computeDaysInfo() {
      if (!DATA.meta || !DATA.meta.sprint) return null;
      var sprint = DATA.meta.sprint;
      if (!sprint.startDate || !sprint.endDate) return null;

      var start = new Date(sprint.startDate);
      var end = new Date(sprint.endDate);
      var now = DATA.meta.generatedAt ? new Date(DATA.meta.generatedAt) : new Date();

      var totalMs = end.getTime() - start.getTime();
      var elapsedMs = now.getTime() - start.getTime();
      var totalDays = Math.max(1, Math.ceil(totalMs / (1000 * 60 * 60 * 24)));
      var elapsedDays = Math.max(0, Math.min(totalDays, Math.ceil(elapsedMs / (1000 * 60 * 60 * 24))));
      var remainingDays = totalDays - elapsedDays;
      var pct = Math.round(elapsedDays / totalDays * 100);

      return {
        dayNum: elapsedDays,
        totalDays: totalDays,
        remainingDays: remainingDays,
        pct: pct
      };
    }

    // Compute completion percentage
    function computeCompletionPct() {
      if (!DATA.summary) return 0;
      var totalSP = DATA.summary.totalSPs || 0;
      if (totalSP === 0) return 0;
      var completedSP = getStatusSP('Closed');
      return Math.round(completedSP / totalSP * 100);
    }

    // Render collapsible section with openByDefault parameter
    function renderCollapsible(title, contentFn, openByDefault) {
      var header = $('h2', { className: openByDefault ? 'collapsible open' : 'collapsible' }, title);
      var content = $('div', { className: openByDefault ? 'collapsible-content open' : 'collapsible-content' });

      header.addEventListener('click', function() {
        header.classList.toggle('open');
        content.classList.toggle('open');
      });

      var inner = contentFn();
      if (inner) {
        content.appendChild(inner);
      }
      return $('div', {}, header, content);
    }

    // Render functions
    function renderHeader() {
      if (!DATA.meta) return null;

      var container = $('div', { className: 'section' });

      var sprintName = (DATA.meta.sprint && DATA.meta.sprint.name) ? DATA.meta.sprint.name : 'Sprint Dashboard';
      container.appendChild($('h1', {}, sprintName));

      var metaText = [];
      if (DATA.meta.team) metaText.push('Team: ' + DATA.meta.team);
      if (DATA.meta.sprint && DATA.meta.sprint.endDate) metaText.push('End Date: ' + DATA.meta.sprint.endDate);
      if (DATA.meta.generatedAt) {
        var genDate = new Date(DATA.meta.generatedAt);
        metaText.push('Generated: ' + genDate.toLocaleString());
      }

      if (metaText.length > 0) {
        container.appendChild($('div', { className: 'meta' }, metaText.join(' | ')));
      }

      return container;
    }

    function renderHealthScore() {
      var health = computeHealthScore();
      var badge = $('div', { className: 'health-score health-' + health.level });
      badge.appendChild($('span', {}, health.label));
      badge.appendChild($('span', { className: 'health-label' }, health.score + '% Complete'));
      return badge;
    }

    function renderDaysRemaining() {
      var info = computeDaysInfo();
      if (!info) return null;

      var container = $('div', { className: 'days-remaining' });

      container.appendChild($('span', { className: 'day-text' }, 'Day ' + info.dayNum + ' of ' + info.totalDays + ' (' + info.remainingDays + ' remaining)'));

      var track = $('div', { className: 'progress-track' });
      track.appendChild($('div', { className: 'progress-fill', style: 'width: ' + Math.min(100, info.pct) + '%' }));
      container.appendChild(track);

      var completionPct = computeCompletionPct();
      container.appendChild($('span', { className: 'completion-pct' }, completionPct + '% Complete'));

      return container;
    }

    function renderFilterBar() {
      var container = $('div', { className: 'filter-bar' });
      var input = $('input', {
        type: 'text',
        placeholder: 'Filter by issue key, summary, assignee, or component...',
        id: 'global-filter'
      });

      input.addEventListener('keyup', function() {
        var query = input.value.toLowerCase().trim();
        var rows = document.querySelectorAll('tr[data-filter]');
        for (var i = 0; i < rows.length; i++) {
          var filterText = rows[i].getAttribute('data-filter') || '';
          if (query === '' || filterText.toLowerCase().indexOf(query) !== -1) {
            rows[i].classList.remove('filter-hidden');
          } else {
            rows[i].classList.add('filter-hidden');
          }
        }
      });

      container.appendChild(input);
      return container;
    }

    function renderSummaryCards() {
      if (!DATA.summary) return null;

      var container = $('div', { className: 'section' });
      container.appendChild($('h2', {}, 'Summary'));

      var cards = $('div', { className: 'cards' });

      // Total
      var totalCard = $('div', { className: 'card' });
      totalCard.appendChild($('div', { className: 'label' }, 'Total'));
      totalCard.appendChild($('div', { className: 'value' }, (DATA.summary.totalIssues || 0) + ' (' + (DATA.summary.totalSPs || 0) + ' SP)'));
      cards.appendChild(totalCard);

      // Completed (from byStatus.Closed)
      var closedCount = getStatusCount('Closed');
      var closedSP = getStatusSP('Closed');
      var completedCard = $('div', { className: 'card green' });
      completedCard.appendChild($('div', { className: 'label' }, 'Completed'));
      completedCard.appendChild($('div', { className: 'value' }, closedCount + ' (' + closedSP + ' SP)'));
      cards.appendChild(completedCard);

      // Code Review (from byStatus["Code Review"])
      var crCount = getStatusCount('Code Review');
      var crSP = getStatusSP('Code Review');
      var codeReviewCard = $('div', { className: 'card yellow' });
      codeReviewCard.appendChild($('div', { className: 'label' }, 'Code Review'));
      codeReviewCard.appendChild($('div', { className: 'value' }, crCount + ' (' + crSP + ' SP)'));
      cards.appendChild(codeReviewCard);

      // Blocked (from summary.blocked.count / .sp)
      var blockedCount = DATA.summary.blocked ? DATA.summary.blocked.count : 0;
      var blockedSP = DATA.summary.blocked ? DATA.summary.blocked.sp : 0;
      var blockedCard = $('div', { className: 'card red' });
      blockedCard.appendChild($('div', { className: 'label' }, 'Blocked'));
      blockedCard.appendChild($('div', { className: 'value' }, blockedCount + ' (' + blockedSP + ' SP)'));
      cards.appendChild(blockedCard);

      // No Story Points (conditional)
      if (DATA.summary.noStoryPoints > 0) {
        var noSPCard = $('div', { className: 'card' });
        noSPCard.appendChild($('div', { className: 'label' }, 'No Story Points'));
        noSPCard.appendChild($('div', { className: 'value' }, DATA.summary.noStoryPoints));
        cards.appendChild(noSPCard);
      }

      container.appendChild(cards);
      return container;
    }

    function renderAlerts() {
      if (!DATA.expectations) return null;

      var alerts = [];

      // overCommitted: {flag, committed, avgVelocity, delta}
      if (DATA.expectations.overCommitted && DATA.expectations.overCommitted.flag) {
        var oc = DATA.expectations.overCommitted;
        var alert = $('div', { className: 'alert critical' });
        alert.appendChild($('strong', {}, 'Over-Commitment'));
        alert.appendChild($('span', {}, 'Committed ' + (oc.committed || 0) + ' SP vs ' + (oc.avgVelocity || 0) + ' SP average velocity (delta: +' + (oc.delta || 0) + ' SP)'));
        alerts.push(alert);
      }

      // underCommitted: {flag, ...}
      if (DATA.expectations.underCommitted && DATA.expectations.underCommitted.flag) {
        var uc = DATA.expectations.underCommitted;
        var alert2 = $('div', { className: 'alert positive' });
        alert2.appendChild($('strong', {}, 'Under-Commitment'));
        var ucMsg = 'Sprint is under-committed';
        if (uc.committed !== undefined && uc.avgVelocity !== undefined) {
          ucMsg = 'Committed ' + uc.committed + ' SP vs ' + uc.avgVelocity + ' SP average velocity';
        }
        alert2.appendChild($('span', {}, ucMsg));
        alerts.push(alert2);
      }

      // codeReviewBottleneck: {flag, percent}
      if (DATA.expectations.codeReviewBottleneck && DATA.expectations.codeReviewBottleneck.flag) {
        var crb = DATA.expectations.codeReviewBottleneck;
        var alert3 = $('div', { className: 'alert' });
        alert3.appendChild($('strong', {}, 'Code Review Bottleneck'));
        alert3.appendChild($('span', {}, (crb.percent || 0) + '% of issues are stuck in code review'));
        alerts.push(alert3);
      }

      // carryForwardRate: array of percentages
      if (DATA.expectations.carryForwardRate && Array.isArray(DATA.expectations.carryForwardRate)) {
        var cfr = DATA.expectations.carryForwardRate;
        if (cfr.length >= 2 && cfr[cfr.length - 1] > cfr[cfr.length - 2]) {
          var alert4 = $('div', { className: 'alert' });
          alert4.appendChild($('strong', {}, 'Carry-Forward Rate Increasing'));
          alert4.appendChild($('span', {}, 'Recent rates: ' + cfr.join('%, ') + '%'));
          alerts.push(alert4);
        }
      }

      if (alerts.length === 0) return null;

      var container = $('div', { className: 'section' });
      container.appendChild($('h2', {}, 'Alerts'));
      for (var i = 0; i < alerts.length; i++) {
        container.appendChild(alerts[i]);
      }

      return container;
    }

    function renderBlocked() {
      // DATA.blocked is an array directly
      var items = Array.isArray(DATA.blocked) ? DATA.blocked : [];

      var container = $('div', { className: 'section' });
      var count = items.length;
      container.appendChild($('h2', {}, 'Blocked Issues (' + count + ')'));

      if (count === 0) {
        var alert = $('div', { className: 'alert positive' });
        alert.appendChild($('span', {}, 'No blocked issues'));
        container.appendChild(alert);
        return container;
      }

      var table = $('table', {});
      var thead = $('thead', {});
      var headerRow = $('tr', {});
      headerRow.appendChild($('th', {}, 'Key'));
      headerRow.appendChild($('th', {}, 'Summary'));
      headerRow.appendChild($('th', {}, 'Priority'));
      headerRow.appendChild($('th', {}, 'Reason'));
      headerRow.appendChild($('th', {}, 'Assignee'));
      thead.appendChild(headerRow);
      table.appendChild(thead);

      var tbody = $('tbody', {});
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var filterText = [item.key, item.summary, item.assignee, item.priority, item.reason].join(' ');

        }

        if (component.carryForward > 0) {
          var alert2 = $('div', { className: 'alert' });
          alert2.appendChild($('strong', {}, 'Carry-Forward'));
          alert2.appendChild($('span', {}, component.carryForward + ' issue(s) carried forward'));
          content.appendChild(alert2);
        }

        if (component.highPriorityBugs > 0) {
          var alert3 = $('div', { className: 'alert critical' });
          alert3.appendChild($('strong', {}, 'High Priority Bugs'));
          alert3.appendChild($('span', {}, component.highPriorityBugs + ' high priority bug(s)'));
          content.appendChild(alert3);
        }

        section.appendChild(header);
        section.appendChild(content);
        wrapper.appendChild(section);
      }

      return wrapper;
    }

    function render() {
      var app = document.getElementById('app');

      // Clear app
      while (app.firstChild) {
        app.removeChild(app.firstChild);
      }

      // Check if data is loaded
      if (!DATA || !DATA.meta) {
        app.appendChild($('div', { className: 'empty-state', style: 'margin-top: 3rem;' }, 'No data loaded.'));
        return;
      }

      // Section order for actionability:
      // 1. Header + Health Score + Days Remaining
      var headerEl = renderHeader();
      if (headerEl) app.appendChild(headerEl);

      app.appendChild(renderHealthScore());

      var daysEl = renderDaysRemaining();
      if (daysEl) app.appendChild(daysEl);

      // 2. Filter Bar
      app.appendChild(renderFilterBar());

      // 3. Alerts (expectations) — expanded
      var alertsEl = renderAlerts();
      if (alertsEl) app.appendChild(alertsEl);

      // 4. Summary Cards — expanded
      var summaryEl = renderSummaryCards();
      if (summaryEl) app.appendChild(summaryEl);

      // 5. Blocked Issues — expanded (PO needs to act)
      var blockedEl = renderBlocked();
      if (blockedEl) app.appendChild(blockedEl);

      // 6. High Priority Bugs — expanded
      var bugsEl = renderBugs();
      if (bugsEl) app.appendChild(bugsEl);

      // 7. Carry-Forward — expanded
      var carryEl = renderCarryForward();
      if (carryEl) app.appendChild(carryEl);

      // 8. DoD Compliance — collapsed by default
      app.appendChild(renderCollapsible('DoD Compliance', renderDoDContent, false));

      // 9. Code Review SP Redo — collapsed by default
      app.appendChild(renderCollapsible('Code Review \u2014 SP Redo Recommendations', renderCodeReviewContent, false));

      // 10. Velocity Trend — collapsed by default
      app.appendChild(renderCollapsible('Velocity Trend', renderVelocityContent, false));

      // 11. Roadmap Alignment — collapsed by default
      app.appendChild(renderCollapsible('Roadmap Alignment', renderRoadmapContent, false));

      // 12. Future Sprint — collapsed by default
      var futureTitle = 'Future Sprint';
      if (DATA.futureSprint && DATA.futureSprint.name) {
        futureTitle = 'Future Sprint \u2014 ' + DATA.futureSprint.name;
      }
      app.appendChild(renderCollapsible(futureTitle, renderFutureSprintContent, false));

      // 13. Per-Assignee — collapsed by default
      var assigneeCount = DATA.assignees ? Object.keys(DATA.assignees).length : 0;
      app.appendChild(renderCollapsible('Per-Assignee Breakdown (' + assigneeCount + ')', renderAssigneesContent, false));

      // 14. Per-Component — collapsed by default
      var componentCount = DATA.components ? Object.keys(DATA.components).length : 0;
      app.appendChild(renderCollapsible('Per-Component Breakdown (' + componentCount + ')', renderComponentsContent, false));
    }

    // Initialize
    render();
  </script>
</body>
</html>
